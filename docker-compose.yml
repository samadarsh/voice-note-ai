# Requires .env in project root with a valid GROQ_API_KEY=gsk_...
services:
  voicenote:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
